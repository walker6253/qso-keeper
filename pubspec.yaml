name: ham_logs
description: "HAM 日志 - 业余无线电通联日志"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  drift: ^2.25.1
  sqlite3_flutter_libs: ^0.5.30
  go_router: ^14.8.1
  dio: ^5.7.0
  shared_preferences: ^2.3.5
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2
