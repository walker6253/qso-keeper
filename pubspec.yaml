  share_plus: ^10.1.4
  file_picker: ^8.1.7
  path: ^1.9.1
  google_fonts: ^6.2.1
  permission_handler: ^11.4.0
  package_info_plus: ^8.3.0
  geolocator: ^13.0.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.25.1
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5

flutter:
